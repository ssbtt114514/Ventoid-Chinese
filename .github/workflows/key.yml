name: Generate Signing Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: '密钥库密码（建议 8 位以上，包含字母和数字）'
        required: true
        type: string
      key_password:
        description: '密钥密码（可与上面相同）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias ventoid \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=Ventoid, OU=Android, O=GPLaider, L=Unknown, ST=Unknown, C=CN"
          echo "✅ 密钥已生成"

      - name: Base64 编码并输出
        run: |
          echo "::add-mask::$(base64 -w 0 release.keystore)"
          echo "KEYSTORE_BASE64=$(base64 -w 0 release.keystore)" >> $GITHUB_ENV

      - name: 创建 Secrets 配置指南
        run: |
          cat > SECRETS_SETUP.md << EOF
          # 🔐 签名密钥配置指南
          
          请前往仓库 **Settings → Secrets and variables → Actions → New repository secret**
          依次添加以下 4 个 Secrets：
          
          ## 1. SIGNING_KEYSTORE_BASE64
          \`\`\`
          ${{ env.KEYSTORE_BASE64 }}
          \`\`\`
          
          ## 2. SIGNING_KEY_ALIAS
          \`\`\`
          ventoid
          \`\`\`
          
          ## 3. SIGNING_KEY_PASSWORD
          \`\`\`
          ${{ inputs.key_password }}
          \`\`\`
          
          ## 4. SIGNING_STORE_PASSWORD
          \`\`\`
          ${{ inputs.keystore_password }}
          \`\`\`
          
          ---
          
          ⚠️ **添加完成后**：
          1. 删除此文件 (\`SECRETS_SETUP.md\`)
          2. 删除 \`.github/workflows/generate-keystore.yml\`
          3. 提交更改
          4. 打标签发布：\`git tag v1.0.0 && git push origin v1.0.0\`
          EOF

      - name: 上传密钥文件（备份用）
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore-backup
          path: release.keystore
          retention-days: 1

      - name: 提交配置指南
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add SECRETS_SETUP.md
          git commit -m "Add signing keystore secrets setup guide"
          git push
