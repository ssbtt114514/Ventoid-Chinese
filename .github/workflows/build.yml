name: Android Build & Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: '上传构建产物'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  verify:
    name: 构建与验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 运行 Lint 检查
        run: ./gradlew :app:lintRelease
        timeout-minutes: 10

      - name: 运行单元测试
        run: ./gradlew :app:testDebugUnitTest
        timeout-minutes: 10

      - name: 构建发布 APK
        run: ./gradlew :app:assembleRelease
        timeout-minutes: 15

      - name: 构建发布 Bundle
        run: ./gradlew :app:bundleRelease
        timeout-minutes: 15

      - name: 上传 Lint 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-release.html
          retention-days: 7

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/
          retention-days: 7

      - name: 上传 APK 产物
        if: ${{ inputs.upload_artifacts || github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: 上传 AAB 产物
        if: ${{ inputs.upload_artifacts || github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

  sign-and-release:
    name: 签名与发布
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 APK 产物
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./artifacts/apk/

      - name: 下载 AAB 产物
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: ./artifacts/bundle/

      - name: 设置签名密钥
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::error::未设置 SIGNING_KEYSTORE_BASE64 Secret，请先运行 Generate Signing Keystore 工作流"
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > ./release.keystore
          echo "✅ 密钥已加载"

      - name: 签名 APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          UNSIGNED=$(find ./artifacts/apk/ -name "*.apk" | head -1)
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks ./release.keystore \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --ks-pass pass:"$SIGNING_STORE_PASSWORD" \
            --key-pass pass:"$SIGNING_KEY_PASSWORD" \
            --out ./artifacts/apk/app-release-signed.apk \
            "$UNSIGNED"
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner verify ./artifacts/apk/app-release-signed.apk
          echo "✅ APK 签名成功"

      - name: 签名 AAB
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          UNSIGNED=$(find ./artifacts/bundle/ -name "*.aab" | head -1)
          jarsigner \
            -keystore ./release.keystore \
            -storepass "$SIGNING_STORE_PASSWORD" \
            -keypass "$SIGNING_KEY_PASSWORD" \
            -signedjar ./artifacts/bundle/app-release-signed.aab \
            "$UNSIGNED" \
            "$SIGNING_KEY_ALIAS"
          jarsigner -verify ./artifacts/bundle/app-release-signed.aab
          echo "✅ AAB 签名成功"

      - name: 清理密钥文件
        if: always()
        run: rm -f ./release.keystore

      - name: 生成 Release Notes
        id: release_notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          PREV_TAG=$(git describe --tags --abbrev=0 $TAG^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## 变更日志 ($PREV_TAG → $TAG)" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s" $PREV_TAG..$TAG >> release_notes.md
          else
            echo "## 初始版本 $TAG" > release_notes.md
            echo "" >> release_notes.md
            echo "这是 Ventoid 中文版的首次发布。" >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "## 安装说明" >> release_notes.md
          echo "1. 下载 \`app-release-signed.apk\`" >> release_notes.md
          echo "2. 在 Android 设备上允许安装未知来源应用" >> release_notes.md
          echo "3. 安装 APK 并授予 USB 权限" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 文件说明" >> release_notes.md
          echo "- \`app-release-signed.apk\` - **已签名 APK 安装包**（推荐）" >> release_notes.md
          echo "- \`app-release-signed.aab\` - 已签名 Android App Bundle" >> release_notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ventoid 中文版 ${{ steps.release_notes.outputs.tag }}"
          body_path: release_notes.md
          files: |
            ./artifacts/apk/app-release-signed.apk
            ./artifacts/bundle/app-release-signed.aab
          draft: false
          prerelease: ${{ contains(steps.release_notes.outputs.tag, 'alpha') || contains(steps.release_notes.outputs.tag, 'beta') || contains(steps.release_notes.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
